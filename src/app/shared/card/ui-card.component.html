<mat-card class="ui-card">
  <mat-card-header>
    @if (subtitle) {
      <mat-card-subtitle>{{ subtitle }}</mat-card-subtitle>
    }
  </mat-card-header>
  <mat-card-content>
    <ng-content></ng-content>
  </mat-card-content>
  <mat-card-actions>
    <ng-content select="[actions]"></ng-content>
  </mat-card-actions>
</mat-card>
