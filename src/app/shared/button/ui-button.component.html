@if (variant === 'raised') {
  <button
    mat-raised-button
    [color]="color"
    [class.ui-primary]="color === 'primary'"
    [class.ui-warn]="color === 'warn'"
    [disabled]="disabled"
    (click)="clicked.emit($event); $event.stopPropagation()"
  >
    <ng-content></ng-content>
  </button>
} @else if (variant === 'flat') {
  <button
    mat-flat-button
    [color]="color"
    [class.ui-primary]="color === 'primary'"
    [class.ui-warn]="color === 'warn'"
    [disabled]="disabled"
    (click)="clicked.emit($event); $event.stopPropagation()"
  >
    <ng-content></ng-content>
  </button>
} @else {
  <button
    mat-button
    [color]="color"
    [class.ui-primary]="color === 'primary'"
    [class.ui-warn]="color === 'warn'"
    [disabled]="disabled"
    (click)="clicked.emit($event); $event.stopPropagation()"
  >
    <ng-content></ng-content>
  </button>
}
