<div class="composer-layout">
  <h2>{{ data?.post ? 'Edit Meme' : 'New Meme' }}</h2>

  <app-ui-input
    label="Title (optional)"
    placeholder="One liner..."
    [value]="title"
    (valueChange)="title = $event; error = ''; saveDraft()"
  ></app-ui-input>

  <app-ui-input
    label="Body"
    placeholder="The actual meme or POV..."
    [multiline]="true"
    [value]="body"
    (valueChange)="body = $event; error = ''; saveDraft()"
  ></app-ui-input>

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  <app-ui-input
    label="Tags (comma separated)"
    placeholder="e.g. angular, css"
    [value]="tags"
    (valueChange)="tags = $event; saveDraft()"
  ></app-ui-input>

  <label class="mood-field">
    Mood
    <select [value]="mood" (change)="updateMood($event)">
      @for (option of moods; track option) {
        <option [value]="option">{{ option }}</option>
      }
    </select>
  </label>

  <div class="actions">
    <app-ui-button variant="basic" (clicked)="dialogRef.close()">Cancel</app-ui-button>
    <app-ui-button variant="raised" color="primary" (clicked)="submit()">Post</app-ui-button>
  </div>
</div>
